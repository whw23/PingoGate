schema_version: "1.0"

preset:
  id: "companion-standard"
  name: "Companion Standard"
  version: "1.0.0"
  description: "Stock spec-kit pipeline, unchanged, with Companion timing capture baked into every command."
  author: "alfredoperez"
  repository: "https://github.com/alfredoperez/speckit-companion"
  license: "MIT"

requires:
  speckit_version: ">=0.8.5"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Stock specify + timing"
      replaces: "speckit.specify"
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Stock clarify + timing"
      replaces: "speckit.clarify"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Stock plan + timing"
      replaces: "speckit.plan"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Stock tasks + timing"
      replaces: "speckit.tasks"
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Stock analyze + timing"
      replaces: "speckit.analyze"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Stock implement + timing"
      replaces: "speckit.implement"
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Stock constitution + timing"
      replaces: "speckit.constitution"

tags:
  - "companion"
  - "standard"
  - "timing"
